<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DTF Queue</title>
    <link rel="stylesheet" href="./newtab.css">
  </head>
  <body>
    <nav class="favorites-bar" id="favorites" aria-label="Быстрые ссылки"></nav>
    <section
      class="favorites-panel"
      id="favorites-panel"
      aria-label="Настройки быстрых ссылок"
      hidden
    ></section>
    <main class="page" aria-live="polite" aria-atomic="true">
      <section class="panel" id="app">
        <h1 class="title">Загружаю новость...</h1>
      </section>
      <section class="panel weather-panel" id="weather" aria-live="polite">
        <h2 class="title">Загружаю погоду...</h2>
      </section>
    </main>
    <script type="module" src="./newtab.js"></script>
  </body>
</html>
